name: Deploy Telegram Webhook Handler

on:
  push:
    branches:
      - master
    paths:
      - 'webhook_handler/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: 'synapse-telegram-webhook'
          region: 'us-east1'
          source: 'webhook_handler'
          flags: '--allow-unauthenticated'
          env_vars: |-
            GCP_PROJECT_ID=gen-lang-client-0479504041
            REASONING_ENGINE_ID=projects/468613454814/locations/us-east1/reasoningEngines/3504750488140644352
